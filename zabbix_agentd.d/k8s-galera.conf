# DEPENDS: kubectl, jq, cut
# SCRIPTS: k8s-galera
#
UserParameter=k8s-galera.discovery-clusters, sudo /etc/zabbix/scripts/k8s-galera --discover-clusters
UserParameter=k8s-galera.values-clusters[*], sudo /etc/zabbix/scripts/k8s-galera --get-cluster "$1" "$2" "$3"
